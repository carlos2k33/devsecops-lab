name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar secretos con GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Analisis estatico con Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/secrets

      - name: Build imagen Docker
        run: docker build -t devsecops-lab:latest .

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-lab:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Instalar dependencias
        run: npm install

      - name: Verificar app arranca
        run: node -e "require('./index.js')" &
